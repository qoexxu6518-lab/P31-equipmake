      <div class="doc-chapter">
        <h2 class="doc-h2" id="doc-select-upgrade">七、装备强化 <button class="doc-screen-btn" onclick="demoGo('select-upgrade')">&#9654; 查看原型</button></h2>
        <h3 class="doc-h3">7.1 强化概念</h3>
        <p>装备强化的本质是将玩家已持有的一件低品质装备"升级"为高一级品质的同类型装备。强化时，<b>消耗原装备 1 件</b>，并消耗图纸和材料，完成后生成下一品质的同类装备。强化方向为品质直升：白→绿→蓝→紫→橙，每次只能升一个等级，橙色为最高品质不可继续强化。</p>
        <h3 class="doc-h3">7.2 强化条件</h3>
        <ul class="doc-list">
          <li>背包中持有 1 件对应的低品质装备（强化开始时消耗）。</li>
          <li>对应的图纸 × 1（消耗）。</li>
          <li>所需的强化材料（种类和数量固定，通常多于打造同品质装备所需）。</li>
          <li>铁匠铺等级满足目标品质装备的解锁要求。</li>
          <li>铁匠铺当前无正在执行的任务。</li>
        </ul>
        <h3 class="doc-h3">7.3 强化列表规则</h3>
        <ul class="doc-list">
          <li>强化列表展示<b>玩家当前持有（count≥1）且存在更高品质版本</b>的装备。</li>
          <li>列表显示的是<b>当前持有的装备</b>（不是目标装备），方便玩家找到手里有的装备。</li>
          <li><b>铁匠铺等级不足以解锁目标品质</b>的强化项不出现在列表（不同于打造列表会显示锁定项）。</li>
          <li>若武将正在佩戴某件装备，该装备图标左上角显示<b>武将头像标记</b>。</li>
          <li>顶部提供<b>「武将筛选」</b>按钮，可过滤只显示某位武将装备中的装备。</li>
        </ul>
        <h3 class="doc-h3">7.4 强化详情面板</h3>
        <ul class="doc-list">
          <li><b>品质图标对比</b>：左侧当前品质图标 → 箭头 → 右侧目标品质图标</li>
          <li><b>装备名称对比</b>：当前名称 → 强化后名称</li>
          <li>若武将正在佩戴该装备，显示武将头像 + 武将名称</li>
          <li><b>属性对比</b>：每条属性显示「旧值 → 新值」，新值颜色高亮</li>
          <li>刻蚀：显示当前装备已有的刻蚀情况；强化后刻蚀不丢失，刻蚀品质上限随品质提升</li>
          <li>洗炼上限对比：旧上限条数 → 新上限条数</li>
          <li>材料需求（含图纸，<b>不包含</b>被消耗的低品质装备本身）</li>
          <li>预计强化时间</li>
          <li><b>「强化装备」</b>按钮</li>
        </ul>
        <h3 class="doc-h3">7.5 强化后的装备归属</h3>
        <p>若被强化的装备正在被武将佩戴，强化完成并收取后，武将<b>自动换装</b>为强化后的新装备（佩戴关系保持，装备更新为高品质版本）。</p>
        <h3 class="doc-h3">7.6 强化与打造的共同规则</h3>
        <p>强化的整体流程与打造相同：确认→扣除材料→进行中→完成→收取。两者共用同一个铁匠铺任务槽，同时只能进行一种操作。</p>
      </div>
-->
